version: '3'
services:
  # 数据库服务
  mysql:
    image: mysql:8.0
    user: "mysql"  # 使用非特权用户
    container_name: lwcode-mysql
    environment:
      MYSQL_ROOT_PASSWORD: weijinqi20040811
      MYSQL_DATABASE: test
      MYSQL_USER: appuser  # 创建普通用户
      MYSQL_PASSWORD: weijinqi20040811  # 普通用户密码
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  # Neo4j服务
  neo4j:
    image: neo4j:5.15
    container_name: lwcode-neo4j
    environment:
      NEO4J_AUTH: neo4j/weijinqi20040811
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    restart: always

  # 主应用服务（包含后端和诊断模型）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lwcode-app
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - neo4j
    environment:
      DB_HOST: mysql
      DB_USER: appuser  # 使用普通用户
      DB_PASSWORD: weijinqi20040811  # 普通用户密码
      DB_NAME: test
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: weijinqi20040811
      DIFY_API_KEY: app-PEYMdCq2OBLRjpqS6J8CInVP
      DIFY_COMMENT_API_KEY: app-PVnwiupRDWii3suJNAj10EvA
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/archives:/app/backend/archives
      - ./NeuralCDM_plus-main:/app/NeuralCDM_plus-main
    restart: always

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lwcode-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always

volumes:
  mysql-data:
  neo4j-data: